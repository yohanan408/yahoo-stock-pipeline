name: CI/CD Portfolio Publisher

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install Pandoc Document Compiler
        uses: r-lib/actions/setup-pandoc@v2

      - name: Cache R Packages (Speeds up future builds)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/index.Rmd') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install Data Science Dependencies
        run: |
          Rscript -e "install.packages(c('tidyverse', 'changepoint', 'randomForest', 'e1071', 'glmnet', 'TTR', 'zoo', 'rmarkdown', 'xgboost', 'lightgbm'), dependencies=TRUE)"

      - name: Render R Markdown directly to Root
        run: |
          Rscript -e "rmarkdown::render('index.Rmd', output_file='index.html')"

      - name: Deploy Compiled Page to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_files: index.html
